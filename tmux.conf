# ──────────────────────────────────────────────────────────────
#  tmux.conf — julien's config
# ──────────────────────────────────────────────────────────────

# ── Terminal ───────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g escape-time 10
set -g history-limit 50000
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-passthrough on

# ── Reload ─────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "config rechargée ✓"

# ── Splits ─────────────────────────────────────────────────────
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# ── Navigation vim-like ────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Sessions / windows ─────────────────────────────────────────
bind t choose-tree -Zs          # session picker
bind w choose-tree -Zw          # window picker
bind e copy-mode

# ── Copy mode vi ───────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Popups ─────────────────────────────────────────────────────
bind g display-popup -E -d "#{pane_current_path}" -h "90%" -w "90%" lazygit
bind b display-popup -E -h "85%" -w "85%" btop
bind i display-popup -E -h "50%" -w "50%" ~/.config/tmux/scripts/network-info.sh
bind ? display-popup -E -h "85%" -w "80%" "glow -p ~/.config/cheatsheet-tmux.md"

# ── Target (CTF/pentest) ───────────────────────────────────────
# prefix+I (maj) = set target   prefix+C-i = clear
bind I command-prompt -p "Target IP:" "run-shell 'echo %1 > ~/.config/tmux/.target'"
bind C-i run-shell "rm -f ~/.config/tmux/.target" \; display "target cleared"

# ── Auto-rename windows ────────────────────────────────────────
set -g automatic-rename on
set -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{?#{==:#{pane_current_command},bash},#{b:pane_current_path},#{pane_current_command}}}'

# ── Activity ───────────────────────────────────────────────────
setw -g monitor-activity on
set -g visual-activity off
setw -g monitor-bell on
set -g visual-bell off

# ── Status bar ─────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 30
set -g status-right-length 200

set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"

# Right: target (CTF) | LAN IP | user@host | time | date
set -g status-right "#(~/.config/tmux/scripts/target.sh)#[fg=#6c7086]│ #[fg=#89dceb]󰩟 #(ipconfig getifaddr en0 2>/dev/null || echo offline)  #[fg=#6c7086]│ #[fg=#a6e3a1]  #(whoami)@#h #[fg=#6c7086]│ #[bg=#89b4fa,fg=#1e1e2e,bold]  %H:%M #[bg=#f38ba8,fg=#1e1e2e,bold]  %d %b "

set -g status-justify left
set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[bg=#313244,fg=#cdd6f4,bold] #I:#W#F "
set -g window-status-separator ""
set -g status-interval 5

# ── Borders ────────────────────────────────────────────────────
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#89b4fa,fg=#1e1e2e,bold"

# ── Plugins (tpm) ──────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# KEEP AT BOTTOM
run '~/.config/tmux/plugins/tpm/tpm'
