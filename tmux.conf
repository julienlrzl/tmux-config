# ──────────────────────────────────────────────────────────────
#  tmux.conf — julien's config
# ──────────────────────────────────────────────────────────────

# ── Terminal ───────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,ghostty:RGB"

# ── Comportement ───────────────────────────────────────────────
set -g mouse on
set -g set-titles on
set -g set-titles-string "#S"
set -s escape-time 10
set -g history-limit 50000
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-passthrough on

# ── Prefix ─────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Reload ─────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config rechargée ✓"

# ── Sessions / windows ─────────────────────────────────────────
bind t choose-tree -Zs
bind w choose-tree -Zw

# ── Splits ─────────────────────────────────────────────────────
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Navigation vim-like ────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode vi ───────────────────────────────────────────────
bind e copy-mode
setw -g mode-keys vi
set -g set-clipboard on
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Popups ─────────────────────────────────────────────────────
bind ? display-popup -E -w 80% -h 85% "glow -p ~/.config/cheatsheet-tmux.md"
bind b display-popup -E -w 85% -h 85% "btop"
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
bind i display-popup -E -w 50% -h 50% "~/.config/tmux/scripts/network-info.sh"

# ── Target (CTF/pentest) ───────────────────────────────────────
bind I command-prompt -p "Target IP:" "run-shell 'echo %1 > ~/.config/tmux/.target'"
bind U run-shell "rm -f ~/.config/tmux/.target" \; display "target cleared"

# ── Status bar — Catppuccin Mocha ──────────────────────────────
set -g status-style bg=#1e1e2e,fg=#cdd6f4
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[fg=#89b4fa,bold] 󰆍 #S "
set -g status-right "#(~/.config/tmux/scripts/target.sh)#[fg=#6c7086] %d/%m/%Y #[fg=#89b4fa,bold] %H:%M "

set -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold] #I #W "
set -g window-status-format "#[fg=#6c7086] #I #W "
set -g status-justify centre

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#89b4fa,fg=#1e1e2e,bold"
